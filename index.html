<!DOCTYPE html>
<html>
<head>
  <title>FinMitra Form</title>
  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      padding: 20px;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 400px;
      margin: auto;
    }

    h2 {
      text-align: center;
    }

    label {
      font-weight: bold;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      background: blue;
      color: white;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      font-size: 16px;
    }

    button:hover {
      background: darkblue;
    }
  </style>
</head>

<body>

<div class="container">
  <h2><b>Select Plan</b></h2>

  <form id="myForm">

    <label>Name</label>
    <input type="text" id="name" required>

    <label>Mobile No</label>
    <input type="number" id="mobile" maxlength="10" required>

    <label>Aadhaar No</label>
    <input type="number" id="aadhaar" maxlength="12" required>

    <label>PAN</label>
    <input type="text" id="pan" required>

    <label>Plan</label>
    <select id="plan" required>
      <option value="">Select</option>
      <option>Basic</option>
      <option>Premium</option>
      <option>Gold</option>
    </select>

    <button type="submit">Create My Account</button>

  </form>
</div>

<script>
document.getElementById("myForm").addEventListener("submit", function(e) {
  e.preventDefault();

  let mobile = document.getElementById("mobile").value;
  let aadhaar = document.getElementById("aadhaar").value;

  if (mobile.length != 10) {
    alert("Mobile number must be 10 digits");
    return;
  }

  if (aadhaar.length != 12) {
    alert("Aadhaar must be 12 digits");
    return;
  }

  let data = {
    name: document.getElementById("name").value,
    mobile: mobile,
    aadhaar: aadhaar,
    pan: document.getElementById("pan").value,
    plan: document.getElementById("plan").value
  };

  fetch("https://script.google.com/macros/s/AKfycbyhOyUG5l9liOBGPoH9ZyDk9tFJ-FGAYQIBKHNB9Hjk_f0oJYTMhPnblNpYiEw4DLMQ/exec", {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.text())
  .then(() => {
    alert("Form Submitted Successfully ✅");
    document.getElementById("myForm").reset();
  })
  .catch(err => {
    alert("Error ❌");
    console.log(err);
  });

});
</script>

</body>
</html>

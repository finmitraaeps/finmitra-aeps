<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DigiBank Seva</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #f5f7fb;
}

.container { padding: 15px; }

.card {
  background: white;
  border-radius: 18px;
  padding: 20px;
  margin: 15px 0;
  border: 2px solid #2d5cff;
}

.btn {
  background: linear-gradient(to right,#2d5cff,#5a7cff);
  color: white;
  padding: 14px;
  border-radius: 12px;
  border: none;
  width: 100%;
}

.form-box {
  display: none;
  background: white;
  padding: 20px;
  margin: 15px 0;
  border-radius: 15px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
}
</style>
</head>

<body>

<div class="container">

<h2 style="text-align:center;">DigiBank Seva</h2>

<!-- RETAILER -->
<div class="card">
  <h3>Retailer</h3>
  <h2>₹499</h2>
  <button class="btn" onclick="openForm('retailer')">Select Plan</button>
</div>

<!-- DISTRIBUTOR -->
<div class="card">
  <h3>Distributor</h3>
  <h2>₹999</h2>
  <button class="btn" onclick="openForm('distributor')">Select Plan</button>
</div>

<!-- FORM -->
<div class="form-box" id="formBox">
  <h3 id="planTitle"></h3>

  <input id="name" placeholder="Full Name">
  <input id="mobile" placeholder="Mobile Number">
  <input id="email" placeholder="Email">

  <button class="btn" onclick="validateForm()">Create My Account</button>
</div>

<!-- PAYMENT -->
<div class="form-box" id="paymentBox">
  <h3>Complete Payment</h3>
  <p>Amount: <b id="amount"></b></p>
  <p>UPI: Q99636372@ybl</p>

  <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=Q99636372@ybl">
</div>

</div>

<script>
let plan = "";

function openForm(p){
  plan = p;
  document.getElementById("formBox").style.display = "block";

  if(p === "retailer"){
    document.getElementById("planTitle").innerText = "Retailer ₹499";
  } else {
    document.getElementById("planTitle").innerText = "Distributor ₹999";
  }
}

function validateForm(){
  let name = document.getElementById("name").value;
  let mobile = document.getElementById("mobile").value;
  let email = document.getElementById("email").value;

  if(name === "" || mobile === "" || email === ""){
    alert("⚠️ Please fill all details first");
    return;
  }

  document.getElementById("paymentBox").style.display = "block";

  if(plan === "retailer"){
    document.getElementById("amount").innerText = "₹499";
  } else {
    document.getElementById("amount").innerText = "₹999";
  }
}
</script>

</body>
</html>

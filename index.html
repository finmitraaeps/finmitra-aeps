<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinMitra AEPS</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{font-family:'Poppins',sans-serif;background:#f4f7fc;margin:0;}
.container{padding:20px;}
.logo{display:block;margin:auto;width:140px;}

.brand{
  text-align:center;font-size:28px;font-weight:700;
  background: linear-gradient(to right, orange, red);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.sub{text-align:center;font-weight:700;font-size:16px;margin-bottom:20px;}

.card{
  background:white;border-radius:20px;padding:20px;margin:15px 0;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);position:relative;
}

.ribbon{
  position:absolute;top:15px;right:-40px;background:#1a73e8;
  color:white;padding:6px 50px;transform:rotate(45deg);font-weight:700;
}

.icon-box{
  width:80px;height:80px;background:#e3f2fd;border-radius:50%;
  display:flex;align-items:center;justify-content:center;margin:auto;
}

.icon-box img{width:45px;}

.title{text-align:center;font-size:22px;font-weight:700;}
.price{text-align:center;font-size:32px;font-weight:700;}

.subprice{text-align:center;font-weight:700;color:#1a73e8;margin-bottom:15px;}

.btn{
  margin-top:20px;width:100%;padding:14px;border:none;border-radius:10px;
  background:#1a73e8;color:white;font-size:16px;font-weight:700;
}

.form-box{
  display:none;background:white;padding:20px;border-radius:15px;margin-top:15px;
}

input,select{
  width:100%;padding:10px;margin:6px 0;border-radius:8px;border:1px solid #ddd;
}
</style>
</head>

<body>

<div class="container">

<img src="finmitra.png" class="logo">

<div class="brand">FinMitra AEPS</div>

<div class="sub">Choose your plan below to start your digital journey</div>

<!-- RETAILER -->
<div class="card">
<div class="ribbon">Most Popular</div>

<div class="icon-box">
<img src="https://cdn-icons-png.flaticon.com/512/2838/2838912.png">
</div>

<div class="title">Retailer</div>
<div class="price">₹499</div>

<button class="btn" onclick="openForm('retailer')">Select Plan</button>
</div>

<!-- FORM -->
<div class="form-box" id="formBox">

<h2 style="text-align:center;font-weight:700;">
Complete Registration for 
<span id="planName" style="color:#1a73e8;">Retailer</span>
</h2>

<input id="name" placeholder="Full Name *">
<input id="mobile" type="tel" maxlength="10" placeholder="Mobile Number *">

<!-- PAN UPDATED -->
<input id="pan" maxlength="10" placeholder="PAN (ABCDE1234F)" style="text-transform:uppercase;">

<input id="aadhaar" type="tel" maxlength="12" placeholder="Aadhaar Number *">

<input id="pincode" type="tel" maxlength="6" placeholder="Pincode *">

<button class="btn" onclick="submitForm()">Create My Account</button>
</div>

</div>

<script>

let plan="";

function openForm(p){
  plan=p;
  document.getElementById("formBox").style.display="block";
  document.getElementById("planName").innerText="Retailer";
  window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'});
}

function submitForm(){

let name=document.getElementById("name").value;
let mobile=document.getElementById("mobile").value;
let aadhaar=document.getElementById("aadhaar").value;
let pincode=document.getElementById("pincode").value;
let pan=document.getElementById("pan").value.toUpperCase();

// PAN validation
let panPattern = /^[A-Z]{5}[0-9]{4}[A-Z]{1}$/;

// silent validation
if(name=="" || mobile=="" || aadhaar=="" || pincode==""){ return; }
if(mobile.length!==10){ return; }
if(aadhaar.length!==12){ return; }
if(pincode.length!==6){ return; }
if(!panPattern.test(pan)){ return; }

// hide form after submit
document.getElementById("formBox").style.display="none";

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinMitra AEPS</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Poppins',sans-serif;
  background:#eef2f7;
  margin:0;
}

.container{
  max-width:400px;
  margin:20px auto;
  background:white;
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.logo{
  display:block;
  margin:auto;
  width:120px;
}

.title{
  text-align:center;
  font-size:22px;
  font-weight:700;
}

.sub{
  text-align:center;
  font-size:14px;
  color:#666;
  margin-bottom:20px;
}

.card{
  border:1px solid #eee;
  border-radius:15px;
  padding:15px;
  margin-bottom:15px;
  position:relative;
}

.ribbon{
  position:absolute;
  top:10px;
  right:-35px;
  background:#1a73e8;
  color:white;
  padding:5px 40px;
  transform:rotate(45deg);
  font-size:12px;
}

.price{
  text-align:center;
  font-size:28px;
  font-weight:700;
}

.features{
  font-size:13px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:5px;
}

.features div::before{
  content:"✔ ";
  color:#1a73e8;
}

.btn{
  width:100%;
  padding:12px;
  background:#1a73e8;
  color:white;
  border:none;
  border-radius:8px;
  margin-top:10px;
  font-weight:600;
}

.form-box{
  display:none;
  margin-top:20px;
}

input,select{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:1px solid #ddd;
}
</style>
</head>

<body>

<div class="container">

<img src="finmitra.png" class="logo">

<div class="title">Become a Partner</div>
<div class="sub">Start your digital journey</div>

<!-- Retailer -->
<div class="card">
<div class="ribbon">Popular</div>
<h3>Retailer</h3>
<div class="price">₹499</div>

<div class="features">
<div>AEPS</div>
<div>Aadhar Pay</div>
<div>Recharge</div>
<div>Money Transfer</div>
</div>

<button class="btn" onclick="openForm('Retailer')">Select Plan</button>
</div>

<!-- Distributor -->
<div class="card">
<h3>Distributor</h3>
<div class="price">₹999</div>

<div class="features">
<div>Unlimited Retailers</div>
<div>High Commission</div>
<div>24x7 Support</div>
<div>Lifetime</div>
</div>

<button class="btn" onclick="openForm('Distributor')">Select Plan</button>
</div>

<!-- FORM -->
<div class="form-box" id="formBox">

<h3 id="planName"></h3>

<input id="name" placeholder="Full Name">
<input id="mobile" placeholder="Mobile Number">
<input id="pan" placeholder="PAN (ABCDE1234F)" style="text-transform:uppercase;">
<input id="aadhaar" placeholder="Aadhaar Number">

<select id="gender">
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<input id="address" placeholder="Address">
<input id="state" placeholder="State">
<input id="city" placeholder="City">
<input id="pincode" placeholder="Pincode">

<button class="btn" onclick="submitForm()">Create Account</button>

</div>

</div>

<script>

let plan="";

function openForm(p){
  plan=p;
  document.getElementById("formBox").style.display="block";
  document.getElementById("planName").innerText = "Register for " + p;
  window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'});
}

function submitForm(){

let name=document.getElementById("name").value;
let mobile=document.getElementById("mobile").value;
let pan=document.getElementById("pan").value.toUpperCase();
let aadhaar=document.getElementById("aadhaar").value;
let gender=document.getElementById("gender").value;
let address=document.getElementById("address").value;
let state=document.getElementById("state").value;
let city=document.getElementById("city").value;
let pincode=document.getElementById("pincode").value;

let panPattern=/^[A-Z]{5}[0-9]{4}[A-Z]{1}$/;

if(!panPattern.test(pan)){
  alert("Invalid PAN Format");
  return;
}

if(mobile.length!==10){
  alert("Mobile must be 10 digits");
  return;
}

if(aadhaar.length!==12){
  alert("Aadhaar must be 12 digits");
  return;
}

fetch("PASTE_YOUR_WEB_APP_URL",{
  method:"POST",
  body:JSON.stringify({
    plan,name,mobile,pan,aadhaar,gender,address,state,city,pincode
  })
});

document.getElementById("formBox").reset;

document.getElementById("paymentBox")?.style.display="block";

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DigiBank Seva</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Poppins',sans-serif;
  background:#f4f7fc;
}

.container{padding:20px;}

.card{
  background:white;
  border-radius:20px;
  padding:20px;
  margin:15px 0;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#2d5cff;
  color:white;
  font-size:16px;
}

.form-box{
  display:none;
  background:white;
  padding:20px;
  border-radius:15px;
  margin-top:15px;
}

input,select{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:1px solid #ddd;
}
</style>
</head>

<body>

<div class="container">

<h2 style="text-align:center;">DigiBank Seva</h2>

<!-- RETAILER -->
<div class="card">
<h3>Retailer ₹499</h3>
<button class="btn" onclick="openForm('retailer')">Select Plan</button>
</div>

<!-- DISTRIBUTOR -->
<div class="card">
<h3>Distributor ₹999</h3>
<button class="btn" onclick="openForm('distributor')">Select Plan</button>
</div>

<!-- FORM -->
<div class="form-box" id="formBox">

<h3 id="planTitle"></h3>

<input id="name" placeholder="Full Name *">
<input id="father" placeholder="Father / Husband Name *">
<input id="dob" type="date">
<input id="shop" placeholder="Shop Name *">
<input id="email" placeholder="Email *">
<input id="mobile" placeholder="Mobile *">
<input id="pan" placeholder="PAN Number *">
<input id="aadhaar" placeholder="Aadhaar Number *">

<select id="gender">
<option value="">Select Gender *</option>
<option>Male</option>
<option>Female</option>
</select>

<input id="address" placeholder="Full Address *">
<input id="state" placeholder="State *">
<input id="city" placeholder="City *">
<input id="pincode" placeholder="Pincode *">

<button class="btn" onclick="validateForm()">Create My Account</button>

</div>

<!-- PAYMENT -->
<div class="form-box" id="paymentBox">

<h3>Complete Payment</h3>

<p style="text-align:center;">Amount: <b id="amount"></b></p>

<p style="text-align:center;">UPI: <b>Q99636372@ybl</b></p>

<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=Q99636372@ybl"
style="display:block;margin:auto;">

</div>

</div>

<script>

let plan="";

function openForm(p){
  plan=p;
  document.getElementById("formBox").style.display="block";

  if(p==="retailer"){
    document.getElementById("planTitle").innerText="Retailer Registration ₹499";
  } else {
    document.getElementById("planTitle").innerText="Distributor Registration ₹999";
  }

  window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'});
}

function validateForm(){

let fields=["name","father","shop","email","mobile","pan","aadhaar","address","state","city","pincode"];

for(let i=0;i<fields.length;i++){
  if(document.getElementById(fields[i]).value===""){
    alert("⚠️ Please fill all details");
    return;
  }
}

if(document.getElementById("gender").value===""){
  alert("⚠️ Select Gender");
  return;
}

document.getElementById("paymentBox").style.display="block";

if(plan==="retailer"){
  document.getElementById("amount").innerText="₹499";
}else{
  document.getElementById("amount").innerText="₹999";
}

window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'});
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DigiBank Seva</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #f5f7fb;
  margin: 0;
}

.container {
  padding: 15px;
}

.header {
  text-align: center;
}

.header p {
  color: gray;
}

/* CARD */
.card {
  background: white;
  border-radius: 18px;
  padding: 20px;
  margin: 15px 0;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  border: 2px solid #2d5cff;
}

.title {
  text-align: center;
  font-weight: 600;
  font-size: 20px;
}

.price {
  text-align: center;
  font-size: 32px;
  font-weight: bold;
}

.btn {
  background: linear-gradient(to right,#2d5cff,#5a7cff);
  color: white;
  padding: 14px;
  border-radius: 12px;
  border: none;
  width: 100%;
  font-size: 16px;
  margin-top: 15px;
}

/* FORM */
.form-box {
  display: none;
  background: white;
  padding: 20px;
  margin: 15px 0;
  border-radius: 15px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <h1>DigiBank Seva</h1>
  <p>Choose your plan below to start your digital journey</p>
</div>

<!-- RETAILER -->
<div class="card">
  <div class="title">Retailer</div>
  <div class="price">₹499</div>
  <button class="btn" onclick="openForm('retailer')">Select Plan</button>
</div>

<!-- DISTRIBUTOR -->
<div class="card">
  <div class="title">Distributor</div>
  <div class="price">₹999</div>
  <button class="btn" onclick="openForm('distributor')">Select Plan</button>
</div>

<!-- FORM -->
<div class="form-box" id="formBox">
  <h3 id="planTitle"></h3>

  <input id="name" placeholder="Full Name">
  <input id="mobile" placeholder="Mobile Number">
  <input id="email" placeholder="Email">
  <input placeholder="Shop Name">
  <input placeholder="City">

  <button class="btn" onclick="validateForm()">Create My Account</button>
</div>

<!-- PAYMENT -->
<div class="form-box" id="paymentBox">
  <h3>Complete Payment</h3>

  <p style="text-align:center;font-size:18px;">
    Amount: <b id="amount"></b>
  </p>

  <p style="text-align:center;">
    UPI: <b>Q99636372@ybl</b>
  </p>

  <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=Q99636372@ybl"
       style="display:block;margin:auto;">

  <p style="text-align:center;color:gray;">
    Payment करने के बाद screenshot save रखें
  </p>
</div>

</div>

<script>
let plan = "";

function openForm(p){
  plan = p;
  document.getElementById("formBox").style.display = "block";

  if(p === "retailer"){
    document.getElementById("planTitle").innerText = "Retailer Registration ₹499";
  } else {
    document.getElementById("planTitle").innerText = "Distributor Registration ₹999";
  }

  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

function validateForm(){
  let name = document.getElementById("name").value;
  let mobile = document.getElementById("mobile").value;
  let email = document.getElementById("email").value;

  if(name === "" || mobile === "" || email === ""){
    alert("⚠️ Please fill all details first");
    return;
  }

  document.getElementById("paymentBox").style.display = "block";

  if(plan === "retailer"){
    document.getElementById("amount").innerText = "₹499";
  } else {
    document.getElementById("amount").innerText = "₹999";
  }

  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}
</script>

</body>
</html>
